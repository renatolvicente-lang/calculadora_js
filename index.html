<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1> Calculadora Simples </h1>
    </header>
    <main>
        <section class="calc">
            <h2>Aqui está a calculadora:</h2>
            <button id="hitorico">Histórico</button>
            <form>
                <div class="valores">
                        <label for="numero1"><h4>Digite os numeros: </h4></label><br>
                        <input type="number" name="numero1" id="numero1"><br>
                        <input type="number" name="numero2" id="numero2"><br>
                        
                        <label for="resultado"><h3>=</h3></label>
                        <output type="number" name="resultado" id="resultado"></output><!--Essa linha serve para exibir o resultado-->
                </div>
                <input type="button" value="+" id="+">
                <input type="button" value="-" id="-">
                <input type="button" value="*" id="*">
                <input type="button" value="/" id="/"> <br>


                <input type="reset" value="Limpar">
            </form>
        </section>
    </main>
    <footer>

    </footer>
    <script src="scripts/script.js"></script>
</body>
</html>
